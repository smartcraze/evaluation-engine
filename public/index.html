<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Evaluation Engine</title>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-800">
    <main class="mx-auto max-w-4xl px-4 py-8">
      <header class="mb-8">
        <h1 class="text-2xl font-semibold">Exam Evaluation Engine</h1>
        <p class="mt-1 text-sm text-slate-600">Upload, evaluate, and fetch result from the API.</p>
      </header>

      <section class="mb-6 rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
        <h2 class="text-lg font-medium">1) Convert Document</h2>
        <form id="convertForm" class="mt-4 grid gap-3 sm:grid-cols-2">
          <div>
            <label class="mb-1 block text-sm font-medium" for="convertMode">Mode</label>
            <select id="convertMode" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
              <option value="localhost">Localhost (SDK auto-poll)</option>
              <option value="webhook">Deployed (webhook)</option>
            </select>
          </div>
          <div>
            <label class="mb-1 block text-sm font-medium" for="examFile">Exam file</label>
            <input id="examFile" name="file" type="file" accept=".pdf,.png,.jpg,.jpeg,.webp" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" required />
          </div>
          <div class="sm:col-span-2">
            <button type="submit" class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700">Convert</button>
          </div>
        </form>
        <p class="mt-3 text-sm">Current request_id: <span id="currentRequestId" class="font-mono text-xs text-slate-600">-</span></p>
      </section>

      <section class="mb-6 rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
        <h2 class="text-lg font-medium">2) Evaluate Extracted Text</h2>
        <form id="evaluateForm" class="mt-4 grid gap-3 sm:grid-cols-3">
          <div>
            <label class="mb-1 block text-sm font-medium" for="evalRequestId">Request ID</label>
            <input id="evalRequestId" type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="Paste request_id" required />
          </div>
          <div>
            <label class="mb-1 block text-sm font-medium" for="maxMarks">Max marks</label>
            <input id="maxMarks" type="number" min="1" value="100" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" />
          </div>
          <div>
            <label class="mb-1 block text-sm font-medium" for="model">Model</label>
            <input id="model" type="text" value="nvidia/nemotron-3-super-120b-a12b:free" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" />
          </div>
          <div class="sm:col-span-3">
            <button type="submit" class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700">Evaluate</button>
          </div>
        </form>
      </section>

      <section class="mb-6 rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
        <h2 class="text-lg font-medium">3) Get Result</h2>
        <form id="resultForm" class="mt-4 flex flex-col gap-3 sm:flex-row">
          <input id="resultRequestId" type="text" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm" placeholder="Paste request_id" required />
          <button type="submit" class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-700">Fetch Result</button>
        </form>
      </section>

      <section class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
        <div class="mb-2 flex items-center justify-between">
          <h2 class="text-lg font-medium">API Response</h2>
          <button id="clearBtn" type="button" class="rounded border border-slate-300 px-2 py-1 text-xs text-slate-600 hover:bg-slate-100">Clear</button>
        </div>
        <pre id="output" class="max-h-[420px] overflow-auto rounded-lg bg-slate-950 p-3 text-xs text-slate-100">Ready.</pre>
      </section>
    </main>

    <script>
      const output = document.getElementById("output");
      const currentRequestId = document.getElementById("currentRequestId");

      function setOutput(data) {
        output.textContent = typeof data === "string" ? data : JSON.stringify(data, null, 2);
      }

      function setRequestId(id) {
        if (!id) return;
        currentRequestId.textContent = id;
        document.getElementById("evalRequestId").value = id;
        document.getElementById("resultRequestId").value = id;
      }

      async function parseResponse(res) {
        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw body;
        return body;
      }

      document.getElementById("convertForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        setOutput("Converting...");
        const mode = document.getElementById("convertMode").value;
        const fileInput = document.getElementById("examFile");
        const file = fileInput.files[0];

        if (!file) {
          setOutput("Please choose a file.");
          return;
        }

        const formData = new FormData();
        formData.append("file", file);

        try {
          const endpoint = mode === "webhook" ? "/convert/webhook" : "/convert/localhost";
          const res = await fetch(endpoint, { method: "POST", body: formData });
          const data = await parseResponse(res);
          setRequestId(data.request_id);
          setOutput(data);
        } catch (err) {
          setOutput(err);
        }
      });

      document.getElementById("evaluateForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        setOutput("Evaluating...");

        const requestId = document.getElementById("evalRequestId").value.trim();
        const maxMarks = Number(document.getElementById("maxMarks").value || 100);
        const model = document.getElementById("model").value.trim();

        if (!requestId) {
          setOutput("request_id is required.");
          return;
        }

        try {
          const res = await fetch(`/evaluate/${encodeURIComponent(requestId)}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ max_marks: maxMarks, model }),
          });
          const data = await parseResponse(res);
          setOutput(data);
        } catch (err) {
          setOutput(err);
        }
      });

      document.getElementById("resultForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        setOutput("Fetching result...");

        const requestId = document.getElementById("resultRequestId").value.trim();
        if (!requestId) {
          setOutput("request_id is required.");
          return;
        }

        try {
          const res = await fetch(`/result/${encodeURIComponent(requestId)}`);
          const data = await parseResponse(res);
          setOutput(data);
        } catch (err) {
          setOutput(err);
        }
      });

      document.getElementById("clearBtn").addEventListener("click", () => setOutput("Ready."));
    </script>
  </body>
</html>
